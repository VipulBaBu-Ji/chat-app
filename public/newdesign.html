<!-- ================= index.html ================= -->
<!DOCTYPE html>
<html>
<head>
    <title>Global Chat Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <h3>🟢 Online Users</h3>
        <ul id="users"></ul>
    </div>

    <div class="chat">

        <div class="header">
            🌍 Global Chat Pro
            <span id="status">Connected</span>
        </div>

        <div id="messages" class="messages"></div>

        <div id="typing" class="typing"></div>

        <div class="input">
            <input id="msg" placeholder="Type message or /msg username text" />
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>


<!-- ================= script.js ================= -->
<script>
const socket = io();
let username = localStorage.getItem("username") || "";

while (!username) {
    username = prompt("Enter your username:");
}

localStorage.setItem("username", username);
socket.emit("join", username);

const msgInput = document.getElementById("msg");
const messages = document.getElementById("messages");

function send() {
    let msg = msgInput.value.trim();
    if (!msg) return;

    if (msg.startsWith("/msg")) {
        let parts = msg.split(" ");
        let to = parts[1];
        let text = parts.slice(2).join(" ");
        socket.emit("privateMessage", { to, msg: text });
    } else {
        socket.emit("chatMessage", msg);
    }

    addMessage("You: " + msg, "me");
    msgInput.value = "";
}

msgInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
});

socket.on("message", (data) => {
    addMessage(`[${data.time}] ${data.user}: ${data.text}`, "other");
});

socket.on("privateMessage", (data) => {
    addMessage(`🔒 ${data.from}: ${data.text}`, "private");
});

socket.on("users", (users) => {
    let list = document.getElementById("users");
    list.innerHTML = "";

    users.forEach(u => {
        let li = document.createElement("li");
        li.innerText = u;

        li.onclick = () => {
            msgInput.value = `/msg ${u} `;
            msgInput.focus();
        };

        list.appendChild(li);
    });
});

msgInput.addEventListener("input", () => {
    socket.emit("typing");
});

socket.on("typing", (user) => {
    document.getElementById("typing").innerText = `${user} is typing...`;

    setTimeout(() => {
        document.getElementById("typing").innerText = "";
    }, 1000);
});

function addMessage(text, type) {
    let div = document.createElement("div");
    div.classList.add("msg", type);
    div.innerText = text;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

socket.on("connect", () => {
    document.getElementById("status").innerText = "🟢 Connected";
});

socket.on("disconnect", () => {
    document.getElementById("status").innerText = "🔴 Disconnected";
});
</script>
