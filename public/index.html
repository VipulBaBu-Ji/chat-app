<!DOCTYPE html>
<html>
<head>
    <title>Global Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <h3>🟢 Online Users</h3>
        <ul id="users"></ul>
    </div>

    <div class="chat">

        <div class="header">
            🌍 Global Chat System
        </div>

        <div id="messages" class="messages"></div>

        <div id="typing" class="typing"></div>

        <div class="input">
            <input id="msg" placeholder="Type message or /msg username text" />
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
